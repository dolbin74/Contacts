<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta name="author" content="David Anna">
 <title>My Contacts</title>
 <meta name="description" content=" Contacts - Week 7.">

  
  <title>Contacts</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }

    h1 {
      margin-bottom: 10px;
    }

    table {
      border-collapse: collapse;
      width: 400px;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid black;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #f0f0f0;
    }

    #lookupBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Contacts Database</h1>
  <p>Select a slot number to view the contact stored there.</p>

  <table>
    <thead>
      <tr>
        <th>Slot #</th>
        <th>Name</th>
      </tr>
    </thead>
    <tbody id="contactRows">
    </tbody>
  </table>

  <button id="lookupBtn">Look Up a Contact</button>

  <script>
    // Pre-filled contacts array
    var contacts = ["Arnold", "Sly", "Dwayne", "Vin", "JCVD", "Steven"];

    // Display table rows
    var tableBody = document.getElementById("contactRows");
    var i = 0;
    while (i < contacts.length) {
      var row = document.createElement("tr");

      var cellSlot = document.createElement("td");
      cellSlot.textContent = i;
      row.appendChild(cellSlot);

      var cellName = document.createElement("td");
      cellName.textContent = contacts[i];
      row.appendChild(cellName);

      tableBody.appendChild(row);

      i = i + 1;
    }

    // Button click handler (no user-defined functions allowed)
    document.getElementById("lookupBtn").onclick = function() {

      var keepGoing = true;

      while (keepGoing === true) {

        var slotText = prompt("Enter the slot number you want to view (0 to " + (contacts.length - 1) + "):");

        if (slotText === null) {
          alert("Canceled.");
          return;
        }

        var slot = parseInt(slotText);

        if (isNaN(slot) || slot < 0 || slot >= contacts.length) {
          alert("That slot does not exist. Please try again.");
        } else {
          var name = contacts[slot];
          alert("You selected " + name + ".");
        }

        var again = prompt("Would you like to search for another name? (yes or no)");

        if (again === null) {
          keepGoing = false;
        } else {
          again = again.toLowerCase();
          if (again !== "yes") {
            keepGoing = false;
          }
        }
      }
    };
  </script>

</body>
</html>
