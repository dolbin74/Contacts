<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contacts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    table {
      border-collapse: collapse;
      margin-top: 20px;
      width: 600px;
    }
    th, td {
      border: 1px solid black;
      padding: 8px;
    }
    th {
      background-color: #eee;
    }
  </style>
</head>
<body>

<h1>Contacts</h1>
<p>Enter your contacts when prompted. They will appear in the table below.</p>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
    </tr>
  </thead>
  <tbody id="contactRows">
  </tbody>
</table>

<script>
  // Ask user how many contacts they want to enter
  var howManyText = prompt("How many contacts would you like to enter?");
  var howMany = parseInt(howManyText);

  // Arrays to store contact info
  var names = [];
  var emails = [];
  var phones = [];

  if (isNaN(howMany) || howMany <= 0) {
    alert("You did not enter a valid number. No contacts will be added.");
  } else {

    var i = 0;
    while (i < howMany) {

      var name = prompt("Enter the name for contact #" + (i + 1));
      if (name === "" || name === null) {
        name = "(no name)";
      }

      var email = prompt("Enter the email for contact #" + (i + 1));
      if (email === "" || email === null) {
        email = "(no email)";
      }

      var phone = prompt("Enter the phone number for contact #" + (i + 1));
      if (phone === "" || phone === null) {
        phone = "(no phone)";
      }

      names[i] = name;
      emails[i] = email;
      phones[i] = phone;

      i = i + 1;
    }

    // Display contacts in the table
    var tableBody = document.getElementById("contactRows");

    var index = 0;
    while (index < names.length) {

      var row = document.createElement("tr");

      var cellNumber = document.createElement("td");
      cellNumber.textContent = index + 1;
      row.appendChild(cellNumber);

      var cellName = document.createElement("td");
      cellName.textContent = names[index];
      row.appendChild(cellName);

      var cellEmail = document.createElement("td");
      cellEmail.textContent = emails[index];
      row.appendChild(cellEmail);

      var cellPhone = document.createElement("td");
      cellPhone.textContent = phones[index];
      row.appendChild(cellPhone);

      tableBody.appendChild(row);

      index = index + 1;
    }

    alert("Contacts added: " + names.length);
  }
</script>

</body>
</html>
